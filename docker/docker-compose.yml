name: anecites

x-default-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - infra
      - media-worker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anecites}
      POSTGRES_USER: ${POSTGRES_USER:-anecites}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anecites_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal
      - media_worker_control_internal
    <<: *default-logging

  media-inference:
    build:
      context: ..
      dockerfile: apps/media-inference/Dockerfile
    profiles:
      - media-inference
      - media-worker
    environment:
      MEDIA_INFERENCE_AUTH_TOKEN: ${MEDIA_INFERENCE_AUTH_TOKEN:-local_media_inference_dev_token_change_me}
      MEDIA_INFERENCE_ALLOWED_BUCKETS: ${MEDIA_INFERENCE_ALLOWED_BUCKETS:-anecites-dev}
      MEDIA_INFERENCE_MAX_MEDIA_BYTES: ${MEDIA_INFERENCE_MAX_MEDIA_BYTES:-536870912}
      MEDIA_INFERENCE_PROCESSING_TIMEOUT_SECONDS: ${MEDIA_INFERENCE_PROCESSING_TIMEOUT_SECONDS:-240}
      MEDIA_INFERENCE_FACE_MIN_DETECTION_CONFIDENCE: ${MEDIA_INFERENCE_FACE_MIN_DETECTION_CONFIDENCE:-0.5}
      MEDIA_INFERENCE_VIDEO_FRAMES_PER_WINDOW: ${MEDIA_INFERENCE_VIDEO_FRAMES_PER_WINDOW:-5}
      MEDIA_INFERENCE_VAD_THRESHOLD: ${MEDIA_INFERENCE_VAD_THRESHOLD:-0.5}
      MEDIA_INFERENCE_VAD_MIN_SPEECH_MS: ${MEDIA_INFERENCE_VAD_MIN_SPEECH_MS:-250}
      MEDIA_INFERENCE_SPEAKER_DIARIZATION_ENABLED: ${MEDIA_INFERENCE_SPEAKER_DIARIZATION_ENABLED:-false}
      MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_PATH: ${MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_PATH:-/models/pyannote/speaker-diarization-community-1}
      MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_REVISION: ${MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_REVISION:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-anecites}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-anecites_dev_password}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - media_inference_internal
      - media_worker_rpc_internal
    read_only: true
    tmpfs:
      - /tmp:size=536870912,mode=1777
    volumes:
      - media_models:/models/pyannote:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5))['status'] == 'ok'"
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    <<: *default-logging

  media-model-bootstrap:
    build:
      context: ..
      dockerfile: apps/media-inference/Dockerfile
    profiles:
      - media-model-bootstrap
    command:
      - python
      - scripts/bootstrap_diarization_model.py
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /tmp/huggingface
      HF_HUB_OFFLINE: "0"
      HF_HUB_DISABLE_TELEMETRY: "1"
      PYANNOTE_METRICS_ENABLED: "0"
      MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_REVISION: ${MEDIA_INFERENCE_SPEAKER_DIARIZATION_MODEL_REVISION:-}
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp:size=536870912,mode=1777
    volumes:
      - media_models:/models/pyannote
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 4g
    cpus: "2.0"
    <<: *default-logging

  redis:
    image: redis:7-alpine
    profiles:
      - infra
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal
    <<: *default-logging

  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles:
      - infra
      - media-worker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-anecites}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-anecites_dev_password}
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal
      - media_worker_control_internal
    <<: *default-logging

  minio:
    image: minio/minio:latest
    profiles:
      - infra
      - media-inference
      - media-worker
      - livekit
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-anecites}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-anecites_dev_password}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal
      - media_inference_internal
    <<: *default-logging

  media-worker:
    build:
      context: ..
      dockerfile: apps/media-worker/Dockerfile
    profiles:
      - media-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anecites}:${POSTGRES_PASSWORD:-anecites_dev_password}@postgres:5432/${POSTGRES_DB:-anecites}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-anecites}:${RABBITMQ_PASSWORD:-anecites_dev_password}@rabbitmq:5672
      MEDIA_ANALYSIS_QUEUE_NAME: ${MEDIA_ANALYSIS_QUEUE_NAME:-media-analysis.jobs}
      MEDIA_ANALYSIS_CONSUMER_PREFETCH: ${MEDIA_ANALYSIS_CONSUMER_PREFETCH:-1}
      MEDIA_ANALYSIS_MAX_RETRIES: ${MEDIA_ANALYSIS_MAX_RETRIES:-3}
      MEDIA_ANALYSIS_RETRY_DELAY_MS: ${MEDIA_ANALYSIS_RETRY_DELAY_MS:-5000}
      MEDIA_ANALYSIS_JOB_LEASE_MS: ${MEDIA_ANALYSIS_JOB_LEASE_MS:-600000}
      MEDIA_ANALYSIS_SHADOW_QUEUE_NAME: ${MEDIA_ANALYSIS_SHADOW_QUEUE_NAME:-media-analysis.shadow.v1.jobs}
      RECORDING_VERIFICATION_QUEUE_NAME: ${RECORDING_VERIFICATION_QUEUE_NAME:-recording-verification.jobs}
      RECORDING_COMPLETENESS_ABSOLUTE_TOLERANCE_MS: ${RECORDING_COMPLETENESS_ABSOLUTE_TOLERANCE_MS:-5000}
      RECORDING_COMPLETENESS_RELATIVE_TOLERANCE_PERCENT: ${RECORDING_COMPLETENESS_RELATIVE_TOLERANCE_PERCENT:-2}
      RECORDING_VERIFICATION_TIMEOUT_MS: ${RECORDING_VERIFICATION_TIMEOUT_MS:-30000}
      MEDIA_INFERENCE_BASE_URL: http://media-inference:8080
      MEDIA_INFERENCE_AUTH_TOKEN: ${MEDIA_INFERENCE_AUTH_TOKEN:-local_media_inference_dev_token_change_me}
      MEDIA_INFERENCE_EXPECTED_ADAPTER_VERSION: ${MEDIA_INFERENCE_EXPECTED_ADAPTER_VERSION:-mediapipe-face-landmarker-0.10.35_silero-vad-6.2.1_pyannote-audio-4.0.7}
      MEDIA_INFERENCE_SPEAKER_DIARIZATION_ENABLED: ${MEDIA_INFERENCE_SPEAKER_DIARIZATION_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media-inference:
        condition: service_healthy
    networks:
      - media_worker_control_internal
      - media_worker_rpc_internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=67108864,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: "1.0"
    <<: *default-logging

  piston:
    image: ${PISTON_IMAGE:-ghcr.io/engineer-man/piston}
    profiles:
      - piston
    privileged: true
    environment:
      PISTON_DISABLE_NETWORKING: "true"
      PISTON_MAX_PROCESS_COUNT: "32"
      PISTON_OUTPUT_MAX_SIZE: "65536"
      PISTON_MAX_OPEN_FILES: "64"
      PISTON_MAX_FILE_SIZE: "65536"
      PISTON_COMPILE_TIMEOUT: "5000"
      PISTON_RUN_TIMEOUT: "5000"
      PISTON_COMPILE_MEMORY_LIMIT: "134217728"
      PISTON_RUN_MEMORY_LIMIT: "134217728"
      PISTON_MAX_CONCURRENT_JOBS: "8"
    ports:
      - "127.0.0.1:${PISTON_PORT:-2000}:2000"
    volumes:
      - piston_packages:/piston/packages
    networks:
      - piston_internal
    <<: *default-logging

  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    profiles:
      - livekit
    command:
      - --config
      - /etc/livekit.yaml
    ports:
      - "127.0.0.1:${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "127.0.0.1:${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "127.0.0.1:${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      livekit-redis:
        condition: service_healthy
    networks:
      - livekit_internal
      - livekit_ingress
    <<: *default-logging

  livekit-egress:
    image: ${LIVEKIT_EGRESS_IMAGE:-livekit/egress:latest}
    profiles:
      - livekit
    environment:
      EGRESS_CONFIG_FILE: /etc/livekit-egress.yaml
    volumes:
      - ./livekit-egress.yaml:/etc/livekit-egress.yaml:ro
    depends_on:
      livekit:
        condition: service_started
      livekit-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - livekit_internal
      - app_internal
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: "256mb"
    <<: *default-logging

  livekit-redis:
    image: redis:7-alpine
    profiles:
      - livekit
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - livekit_redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livekit_internal
    <<: *default-logging

  judge0-server:
    image: ${JUDGE0_IMAGE:-judge0/judge0:latest}
    profiles:
      - judge0
    env_file:
      - ./judge0.conf
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "127.0.0.1:${JUDGE0_PORT:-2358}:2358"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    privileged: true
    networks:
      - judge0_internal
      - judge0_ingress
    <<: *default-logging

  judge0-worker:
    image: ${JUDGE0_IMAGE:-judge0/judge0:latest}
    profiles:
      - judge0
    command:
      - ./scripts/workers
    env_file:
      - ./judge0.conf
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    privileged: true
    networks:
      - judge0_internal
    <<: *default-logging

  judge0-db:
    image: postgres:16-alpine
    profiles:
      - judge0
    env_file:
      - ./judge0.conf
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - judge0_internal
    <<: *default-logging

  judge0-redis:
    image: redis:7-alpine
    profiles:
      - judge0
    command:
      - sh
      - -c
      - redis-server --appendonly no --requirepass "$${REDIS_PASSWORD}"
    env_file:
      - ./judge0.conf
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - judge0_internal
    <<: *default-logging

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  media_models:
  piston_packages:
  livekit_redis_data:
  judge0_postgres_data:

networks:
  app_internal:
  piston_internal:
  livekit_internal:
    internal: true
  livekit_ingress:
  judge0_internal:
    internal: true
  judge0_ingress:
  media_inference_internal:
    internal: true
  media_worker_control_internal:
    internal: true
  media_worker_rpc_internal:
    internal: true
